---
name: Publish packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    container:
      image: public.ecr.aws/jsii/superchain:1-bookworm-slim-node20

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          make install
          sudo apt-get update
          sudo apt-get install -y tree jq

      - name: Build source w/ jsii
        run: |
          lambda/build
          npx jsii
          make validate-package

      - name: Build packages w/ jsii-pacmak
        run: |
          npx jsii-pacmak --verbose
          tree dist

      - name: Publish to npm
        run: npx publib-npm
        env:
          NPM_TRUSTED_PUBLISHER: "true"
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish to PyPI
        run: |
          export PIP_BREAK_SYSTEM_PACKAGES=1
          npx publib-pypi
        env:
          PYPI_TRUSTED_PUBLISHER: "true"

      - name: Publish to NuGet
        run: npx publib-nuget
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_TOKEN }}
